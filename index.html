<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goals — Minimal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    /* Fallback: always show hamburger on screens <640px */
    #navToggle { display: none; }
      @media (max-width: 639px) {
        #navToggle svg { stroke: white !important; }
      }
    @media (max-width: 639px) {
      #navToggle { display: inline-flex !important; }
      #desktopNav { display: none !important; }
    }
  </style>
</head>

<body class="pb-20 text-text-primary surface">
  <!-- Header -->
  <!-- Header -->
  <header class="p-4 shadow-sm header">
    <div class="max-w-3xl mx-auto flex items-center justify-between relative">
      <!-- Logo -->
      <div>
        <img class="w-24 logo" src="./assets/logos/marcus-gs-logo-dark.svg" alt="Marcus Savings Goal Tracker">
      </div>

      <!-- Desktop navigation -->
      <nav id="desktopNav" class="hidden sm:flex items-center gap-4 text-sm font-semibold text-text-primary">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html" class="nav-link">Goals</a>
        <a href="index.html" class="nav-link">Stats</a>
        <button id="toggleGoalForm" class="btn btn-contrast-subtle">New Goal</button>
      </nav>

      <!-- Mobile hamburger (always visible on mobile) -->
      <button id="navToggle" aria-expanded="false" aria-controls="mobileMenu" class="sm:hidden p-2 rounded hover:bg-gray-100 focus:outline-none focus:ring">
        <svg class="w-6 h-6" fill="none" stroke="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
    </div>
  </header>

  <!-- Mobile dropdown menu (upper-right) -->
  <div id="mobileMenu" class="hidden sm:hidden fixed top-4 right-4 z-50 bg-white border rounded shadow p-3 w-48">
    <nav class="flex flex-col gap-2 text-sm font-semibold text-text-primary">
      <a href="index.html" class="nav-link">Home</a>
      <a href="index.html" class="nav-link">Goals</a>
      <a href="index.html" class="nav-link">Stats</a>
      <button type="button" id="mobileNewGoal" class="btn btn-contrast-subtle mt-2">New Goal</button>
    </nav>
  </div>

  <!-- Main -->
  <main class="max-w-3xl mx-auto p-4">
    <!-- Stats -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="stat-card p-4">
        <div class="text-sm text-gray-500 opacity-70">Active Goals</div>
        <div id="activeCount" class="text-2xl font-bold">0</div>
      </div>
      <div class="stat-card p-4">
        <div class="text-sm text-gray-500 opacity-70">Completed</div>
        <div id="completedCount" class="text-2xl font-bold text-green-700">0</div>
      </div>
    </div>

    <!-- Create form (hidden by default) -->
    <section id="goalFormSection" class="hidden card p-4 mb-4">
      <h2 class="font-semibold mb-2">Create New Goal</h2>
      <form id="goalForm" novalidate class="space-y-3">
        <div>
          <label class="block text-sm font-semibold pb-2">Name</label>
          <input id="goalName" class="form-input w-full" type="text" placeholder="Emergency fund" required />
          <p id="goalNameError" class="text-xs text-red-600 mt-1"></p>
        </div>
        <div>
          <label class="block text-sm font-semibold pb-2">Category</label>
          <select id="goalCategory" class="form-input w-full">
            <option>General</option>
            <option>Vacation</option>
            <option>Emergency</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold pb-2">Target Amount ($)</label>
          <input id="targetAmount" class="form-input w-full" type="number" min="1" step="0.01" required />
          <p id="targetAmountError" class="text-xs text-red-600 mt-1"></p>
        </div>
        <div>
          <label class="block text-sm font-semibold pb-2">Target Date</label>
          <input id="targetDate" class="form-input w-full" type="date" required />
          <p id="targetDateError" class="text-xs text-red-600 mt-1"></p>
        </div>
        <div class="flex place-content-between">
          <button type="button" id="cancelCreate" class="btn btn-primary-subtle">Cancel</button>
          <button type="submit" class="btn btn-primary-bold">Create Goal</button>
        </div>
        <p id="limitError" class="text-xs text-red-600 mt-1"></p>
      </form>
    </section>

    <!-- Active Goals -->
    <section>
      <h3 class="font-semibold mb-2">Active</h3>
      <div id="activeGoals" class="space-y-3"></div>
    </section>

    <!-- Completed Goals -->
    <section class="mt-6">
      <h3 class="font-semibold mb-2">Completed</h3>
      <div id="completedGoals" class="space-y-3"></div>
    </section>
  </main>

  <!-- Minimal footer (optional) -->
  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t">
    <div class="max-w-3xl mx-auto p-3 text-center text-sm text-gray-500">Minimal Goals App</div>
  </footer>

  <script>
    // Mobile nav toggle behavior
    (function(){
      const navToggle = document.getElementById('navToggle');
      const mobileMenu = document.getElementById('mobileMenu');
      const desktopToggle = document.getElementById('toggleGoalForm');
      const mobileNew = document.getElementById('mobileNewGoal');

      function openMenu(){
        mobileMenu.classList.remove('hidden');
        navToggle.setAttribute('aria-expanded','true');
      }
      function closeMenu(){
        mobileMenu.classList.add('hidden');
        if(navToggle) navToggle.setAttribute('aria-expanded','false');
      }

      if(navToggle){
        navToggle.addEventListener('click', (e)=>{
          if(mobileMenu.classList.contains('hidden')) openMenu(); else closeMenu();
        });
      }

      // close when clicking outside
      document.addEventListener('click', (e)=>{
        if(!mobileMenu || mobileMenu.classList.contains('hidden')) return;
        const path = e.composedPath ? e.composedPath() : (e.path || []);
        if(!path.includes(mobileMenu) && !path.includes(navToggle)) closeMenu();
      });

      // close on escape
      document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeMenu(); });

      // wire mobile New Goal to desktop toggle (opens the same form)
      if(mobileNew && desktopToggle){
        mobileNew.addEventListener('click', ()=>{ desktopToggle.click(); closeMenu(); });
      }
    })();
  </script>

  <script src="goals.js"></script>
</body>

</html>
