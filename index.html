<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goals — Minimal</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body class="pb-20 bg-gray-50 text-gray-900">
  <!-- Header -->
  <header class="p-4 shadow-sm bg-white">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <!-- Logo -->
      <div>
        <img class="w-24" src="./assets/logos/marcus-gs-logo-light.svg" alt="Marcus Savings Goal Tracker" class="logo">
      </div>
      <!-- Navigation -->
      <div class="flex items-center gap-4 text-sm font-semibold text-white">
        <a href="index.html" class="nav-link">Home</a>
        <a href="goals.html" class="nav-link active">Goals</a>
        <a href="stats.html" class="nav-link">Stats</a>
        <button id="toggleGoalForm" class="btn btn-primary-bold">New Goal</button>
        <button id="themeToggle" class="text-sm">☀️</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-3xl mx-auto p-4">
    <!-- Stats -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div class="card p-3">
        <div class="text-sm text-gray-500">Active Goals</div>
        <div id="activeCount" class="text-2xl font-bold">0</div>
      </div>
      <div class="card p-3">
        <div class="text-sm text-gray-500">Completed</div>
        <div id="completedCount" class="text-2xl font-bold">0</div>
      </div>
    </div>

    <!-- Create form (hidden by default) -->
    <section id="goalFormSection" class="hidden card p-4 mb-4">
      <h2 class="font-semibold mb-2">Create New Goal</h2>
      <form id="goalForm" novalidate class="space-y-3">
        <div>
          <label class="block text-sm">Name</label>
          <input id="goalName" class="form-input w-full" type="text" placeholder="Emergency fund" required />
          <p id="goalNameError" class="text-xs text-red-600 mt-1"></p>
        </div>
        <div>
          <label class="block text-sm">Category</label>
          <select id="goalCategory" class="form-input w-full">
            <option>General</option>
            <option>Vacation</option>
            <option>Emergency</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label class="block text-sm">Target Amount ($)</label>
          <input id="targetAmount" class="form-input w-full" type="number" min="1" step="0.01" required />
          <p id="targetAmountError" class="text-xs text-red-600 mt-1"></p>
        </div>
        <div>
          <label class="block text-sm">Target Date</label>
          <input id="targetDate" class="form-input w-full" type="date" required />
          <p id="targetDateError" class="text-xs text-red-600 mt-1"></p>
        </div>
        <div class="flex gap-2">
          <button type="submit" class="btn btn-primary flex-1">Create Goal</button>
          <button type="button" id="cancelCreate" class="btn btn-secondary flex-1">Cancel</button>
        </div>
        <p id="limitError" class="text-xs text-red-600 mt-1"></p>
      </form>
    </section>

    <!-- Active Goals -->
    <section>
      <h3 class="font-semibold mb-2">Active</h3>
      <div id="activeGoals" class="space-y-3"></div>
    </section>

    <!-- Completed Goals -->
    <section class="mt-6">
      <h3 class="font-semibold mb-2">Completed</h3>
      <div id="completedGoals" class="space-y-3"></div>
    </section>
  </main>

  <!-- Minimal footer (optional) -->
  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t">
    <div class="max-w-3xl mx-auto p-3 text-center text-sm text-gray-500">Minimal Goals App</div>
  </footer>

  <script src="goals.js"></script>
</body>
</html>
